services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vrc-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - RUST_LOG=vrc_backend=info,tower_http=info,sqlx=warn
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - gallery_data:/var/lib/vrc/gallery
    networks:
      - internal

  db:
    image: postgres:16-bookworm
    container_name: vrc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vrc_class_reunion
      POSTGRES_USER: vrc_app
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrc_app -d vrc_class_reunion"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    shm_size: '256mb'
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=4MB
      - -c
      - effective_cache_size=512MB
      - -c
      - random_page_cost=1.1
      - -c
      - log_min_duration_statement=100

  caddy:
    image: caddy:2-alpine
    container_name: vrc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - internal

volumes:
  pgdata:
    driver: local
  gallery_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

secrets:
  db_password:
    file: ./secrets/db_password.txt

networks:
  internal:
    driver: bridge
