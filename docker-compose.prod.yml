services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: "${VRC_BACKEND_IMAGE:-vrc-backend:local}"
    pull_policy: build
    container_name: vrc-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUST_LOG=vrc_backend=info,tower_http=info,sqlx=warn
      - BIND_ADDRESS=0.0.0.0:3000
      - BACKEND_BASE_URL=https://vrcapi.arivell-vm.com
      - DATABASE_URL=postgres://vrc:${POSTGRES_PASSWORD:-vrc_dev_password}@db:5432/vrc_backend
      - FRONTEND_ORIGIN=https://vrc10.arivell-vm.com
      - DISCORD_REDIRECT_URI=https://vrcapi.arivell-vm.com/api/v1/auth/discord/callback
      - COOKIE_SECURE=true
      - TRUST_X_FORWARDED_FOR=true
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - gallery_data:/var/lib/vrc/gallery
    networks:
      - internal

  frontend:
    build:
      context: ../Web-Frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://app:3000
        NEXT_PUBLIC_API_URL: https://vrcapi.arivell-vm.com
        NEXT_PUBLIC_SITE_URL: https://vrc10.arivell-vm.com
        FRONTEND_ORIGIN: https://vrc10.arivell-vm.com
    image: "${VRC_FRONTEND_IMAGE:-vrc-frontend:local}"
    pull_policy: build
    container_name: vrc-frontend
    restart: unless-stopped
    environment:
      - INTERNAL_API_URL=http://app:3000
      - NEXT_PUBLIC_API_URL=https://vrcapi.arivell-vm.com
      - NEXT_PUBLIC_SITE_URL=https://vrc10.arivell-vm.com
      - FRONTEND_ORIGIN=https://vrc10.arivell-vm.com
      - NODE_ENV=production
    depends_on:
      app:
        condition: service_started
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: vrc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vrc_backend
      POSTGRES_USER: vrc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vrc_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrc -d vrc_backend"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    shm_size: '256mb'
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=4MB
      - -c
      - effective_cache_size=512MB
      - -c
      - random_page_cost=1.1
      - -c
      - log_min_duration_statement=100

  caddy:
    image: caddy:2-alpine
    container_name: vrc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./secrets/cloudflare-origin.crt:/etc/caddy/certs/cloudflare-origin.crt:ro
      - ./secrets/cloudflare-origin.key:/etc/caddy/certs/cloudflare-origin.key:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
    driver: local
    name: web-backend_pgdata
  gallery_data:
    driver: local
    name: vrc-prod-gallery-data
  caddy_data:
    driver: local
    name: vrc-prod-caddy-data
  caddy_config:
    driver: local
    name: vrc-prod-caddy-config

networks:
  internal:
    driver: bridge
