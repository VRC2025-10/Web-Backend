name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the details below to help us diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Send a request to '...'
        2. With payload '...'
        3. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, status codes, or log output.
    validations:
      required: true

  - type: dropdown
    id: api-layer
    attributes:
      label: API Layer
      description: Which API layer is affected?
      options:
        - Public API (/api/v1/public/*)
        - Internal API (/api/v1/internal/*)
        - System API (/api/v1/system/*)
        - Auth API (/api/v1/auth/*)
        - Health / Metrics
        - Not applicable
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of the backend are you running?
      placeholder: "e.g., 0.1.0 or commit SHA"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment.
      placeholder: |
        - OS: Ubuntu 22.04
        - Rust: 1.85.0
        - PostgreSQL: 16.2
        - Docker: 25.0.3
        - Running via: cargo run / Docker
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output. This will be automatically formatted.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I am using a supported version
          required: true
