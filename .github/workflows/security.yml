# =============================================================================
#  Security Scanning Pipeline — VRC Backend
#  ─────────────────────────────────────────────────────────────────────────────
#  Comprehensive security analysis: SAST, SCA, secret detection,
#  container scanning, license compliance, and dependency review.
#  Runs on schedule (weekly) and on-demand.
# =============================================================================
name: "Security"
run-name: "Security Scan ∙ ${{ github.event_name }}"

on:
  schedule:
    # Weekly Monday 03:00 JST (18:00 UTC Sunday)
    - cron: "0 18 * * 0"
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "vrc-backend/Cargo.toml"
      - "vrc-macros/Cargo.toml"
      - "Dockerfile"
  workflow_dispatch:
    inputs:
      scan_scope:
        description: "Scan scope"
        type: choice
        options:
          - full
          - dependencies-only
          - container-only
        default: "full"

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: "security-${{ github.ref }}"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================================================
  # Dependency Audit (cargo-audit + cargo-deny)
  # ===========================================================================

  dependency-audit:
    name: "Dependency Audit"
    if: inputs.scan_scope != 'container-only'
    runs-on: arc-runner-set
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install audit tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: cargo audit (advisories)
        run: |
          echo "::group::Cargo Audit Results"
          cargo audit \
            --deny warnings \
            --deny unmaintained \
            --deny yanked \
            --json 2>&1 | tee audit-results.json || true
          echo "::endgroup::"

          # Separate strict check for CI gate
          cargo audit --deny warnings --deny unmaintained --deny yanked

      - name: cargo deny (licenses)
        run: |
          set -o pipefail
          echo "::group::License Check"
          cargo deny check licenses 2>&1 | tee license-results.txt
          echo "::endgroup::"

      - name: cargo deny (advisories cross-check)
        run: |
          set -o pipefail
          echo "::group::Advisory Cross-Check"
          cargo deny check advisories 2>&1 | tee advisory-results.txt
          echo "::endgroup::"

      - name: cargo deny (bans & sources)
        run: |
          set -o pipefail
          echo "::group::Ban & Source Check"
          cargo deny check bans 2>&1 | tee bans-results.txt
          cargo deny check sources 2>&1 | tee sources-results.txt
          echo "::endgroup::"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.sha }}
          path: |
            audit-results.json
            license-results.txt
            advisory-results.txt
            bans-results.txt
            sources-results.txt
          retention-days: 90

  # ===========================================================================
  # Secret Detection
  # ===========================================================================

  secret-scan:
    name: "Secret Scanning"
    if: inputs.scan_scope != 'container-only'
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Gitleaks — full history scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Manual secret pattern scan
        if: always()
        run: |
          echo "::group::Custom Secret Patterns"

          PATTERNS=(
            'PRIVATE.KEY'
            'BEGIN RSA'
            'BEGIN EC PRIVATE'
            'BEGIN OPENSSH PRIVATE'
            'password\s*=\s*["\x27][^"\x27]+'
            'secret\s*=\s*["\x27][^"\x27]+'
            'token\s*=\s*["\x27][^"\x27]+'
            'ghp_[a-zA-Z0-9]{36}'
            'gho_[a-zA-Z0-9]{36}'
            'github_pat_[a-zA-Z0-9_]{82}'
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include='*.rs' --include='*.toml' --include='*.yml' \
              --include='*.yaml' --include='*.json' --include='*.env*' \
              -E "${pattern}" . 2>/dev/null | grep -v 'target/' | grep -v '.git/' || true)

            if [[ -n "${MATCHES}" ]]; then
              echo "::warning::Potential secret pattern found: ${pattern}"
              echo "${MATCHES}" | head -5
              FOUND=$((FOUND + 1))
            fi
          done

          echo "::endgroup::"

          if (( FOUND > 0 )); then
            echo "::warning::Found ${FOUND} potential secret pattern(s). Review manually."
          else
            echo "No custom secret patterns detected"
          fi

  # ===========================================================================
  # Container Scanning
  # ===========================================================================

  container-scan:
    name: "Container Scanning"
    if: inputs.scan_scope != 'dependencies-only'
    runs-on: arc-runner-set
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: "vrc-backend:scan-${{ github.sha }}"
          cache-from: type=gha,scope=docker-security
          cache-to: type=gha,mode=max,scope=docker-security

      - name: Trivy vulnerability scan
        id: trivy-table
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "vrc-backend:scan-${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: "trivy-table.txt"
        continue-on-error: true

      - name: Trivy SARIF output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "vrc-backend:scan-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-container"
        continue-on-error: true

      - name: Trivy SBOM generation
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "vrc-backend:scan-${{ github.sha }}"
          format: "cyclonedx"
          output: "sbom.cdx.json"
          scan-type: "image"

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-${{ github.sha }}
          path: |
            trivy-table.txt
            trivy-results.sarif
            sbom.cdx.json
          retention-days: 90

      - name: Container scan summary
        if: always()
        run: |
          echo "## Container Scan Results" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f trivy-table.txt ]]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat trivy-table.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail on vulnerability findings
        if: always()
        run: |
          if [[ "${{ steps.trivy-table.outcome }}" != "success" ]]; then
            echo "::error::Trivy detected vulnerabilities at the configured severity threshold."
            exit 1
          fi

      - name: Cleanup scan image
        if: always()
        run: docker rmi "vrc-backend:scan-${{ github.sha }}" 2>/dev/null || true

  # ===========================================================================
  # SAST (Rust-specific static analysis)
  # ===========================================================================

  sast:
    name: "SAST Analysis"
    if: inputs.scan_scope != 'container-only'
    runs-on: arc-runner-set
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: "stable"
          components: "clippy"
          cache-prefix: "v1-sast"

      - name: Clippy security lints
        run: |
          set -o pipefail
          cargo clippy \
            --workspace \
            --all-targets \
            --all-features \
            -- -D warnings \
               -W clippy::unwrap_used \
               -W clippy::expect_used \
               -W clippy::panic \
               -W clippy::unimplemented \
               -W clippy::todo \
               -W clippy::dbg_macro \
               -W clippy::print_stdout \
               -W clippy::print_stderr \
               -W clippy::unsafe_derive_deserialize \
               -A clippy::module_name_repetitions \
               -A clippy::must_use_candidate \
               -A clippy::missing_errors_doc \
               -A clippy::missing_panics_doc \
            2>&1 | tee clippy-security-results.txt

      - name: Check for unsafe code usage
        run: |
          echo "::group::Unsafe Code Audit"
          UNSAFE_COUNT=$(grep -rn 'unsafe' vrc-backend/src/ vrc-macros/src/ \
            --include='*.rs' | grep -v '// SAFETY:' | grep -v 'test' | wc -l || true)

          if (( UNSAFE_COUNT > 0 )); then
            echo "::warning::Found ${UNSAFE_COUNT} uses of 'unsafe' without SAFETY comments"
            grep -rn 'unsafe' vrc-backend/src/ vrc-macros/src/ \
              --include='*.rs' | grep -v '// SAFETY:' | grep -v 'test'
          else
            echo "No unaudited unsafe code found"
          fi
          echo "::endgroup::"

      - name: Upload SAST results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-results-${{ github.sha }}
          path: clippy-security-results.txt
          retention-days: 90
          if-no-files-found: ignore

  # ===========================================================================
  # Dependency Review (PR only)
  # ===========================================================================

  dependency-review:
    name: "Dependency Review"
    if: github.event_name == 'pull_request'
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0
          comment-summary-in-pr: always

  # ===========================================================================
  # Security Gate
  # ===========================================================================

  security-gate:
    name: "Security Gate"
    if: always()
    needs:
      - dependency-audit
      - secret-scan
      - container-scan
      - sast
      - dependency-review
    runs-on: arc-runner-set
    timeout-minutes: 5
    steps:
      - name: Evaluate security posture
        run: |
          echo "## Security Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret Scanning | ${{ needs.secret-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SAST | ${{ needs.sast.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Review | ${{ needs.dependency-review.result }} |" >> "$GITHUB_STEP_SUMMARY"

          CRITICAL_RESULTS=(
            "${{ needs.dependency-audit.result }}"
            "${{ needs.secret-scan.result }}"
            "${{ needs.container-scan.result }}"
            "${{ needs.sast.result }}"
            "${{ needs.dependency-review.result }}"
          )

          for result in "${CRITICAL_RESULTS[@]}"; do
            if [[ "${result}" == "failure" ]]; then
              echo "::error::Security gate failed because at least one required scan reported a failure."
              exit 1
            fi
          done

          echo "Security gate evaluation complete"

  # ===========================================================================
  # Notification
  # ===========================================================================

  notify:
    name: "Security Notification"
    needs: [security-gate]
    if: failure()
    uses: ./.github/workflows/reusable-notify.yml
    with:
      status: "failure"
      title: "Security Scan — Vulnerabilities Found"
      additional-message: "Security scanning detected issues requiring attention."
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
    permissions: {}
