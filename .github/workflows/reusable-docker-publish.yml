# =============================================================================
#  Reusable Workflow: Docker Build & Publish
#  Multi-stage Docker build with BuildKit, provenance attestation,
#  SBOM generation, and container vulnerability scanning.
# =============================================================================
name: "Reusable — Docker Publish"

on:
  workflow_call:
    inputs:
      runner-label:
        description: "Runner label"
        required: false
        type: string
        default: "arc-runner-set"
      registry:
        description: "Container registry"
        required: false
        type: string
        default: "ghcr.io"
      image-name:
        description: "Image name (defaults to github.repository)"
        required: false
        type: string
        default: ""
      context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile path"
        required: false
        type: string
        default: "./Dockerfile"
      push:
        description: "Push image to registry"
        required: false
        type: boolean
        default: false
      scan:
        description: "Run Trivy vulnerability scan"
        required: false
        type: boolean
        default: true
      scan-severity:
        description: "Trivy scan severity threshold"
        required: false
        type: string
        default: "CRITICAL,HIGH"
      generate-sbom:
        description: "Generate SBOM attestation"
        required: false
        type: boolean
        default: true
      build-args:
        description: "Docker build arguments (newline-separated KEY=VALUE)"
        required: false
        type: string
        default: ""
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        type: string
        default: "linux/amd64"
      tag-value:
        description: "Additional raw image tag to publish"
        required: false
        type: string
        default: ""
      timeout:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 45
    outputs:
      image-digest:
        description: "Image digest (sha256:...)"
        value: ${{ jobs.docker.outputs.digest }}
      image-tags:
        description: "Published image tags"
        value: ${{ jobs.docker.outputs.tags }}
      image-metadata:
        description: "Image metadata JSON"
        value: ${{ jobs.docker.outputs.metadata }}
      scan-result:
        description: "Trivy scan exit code (0=clean)"
        value: ${{ jobs.docker.outputs.scan_result }}
    secrets:
      REGISTRY_TOKEN:
        description: "Registry authentication token"
        required: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  docker:
    name: "Docker Build & Publish"
    runs-on: ${{ inputs.runner-label }}
    timeout-minutes: ${{ inputs.timeout }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
      metadata: ${{ steps.meta.outputs.json }}
      scan_result: ${{ steps.scan.outcome }}
    env:
      REGISTRY: ${{ inputs.registry }}
      IMAGE_NAME: ${{ inputs.image-name || github.repository }}
    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ── Docker metadata ──────────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # SHA-based tag for traceability
            type=sha,prefix=sha-,format=short
            # Branch name tag
            type=ref,event=branch
            # PR number tag
            type=ref,event=pr,prefix=pr-
            # Semantic version tags from git tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            # Latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Caller-specified tag for manual release flows
            type=raw,value=${{ inputs.tag-value }},enable=${{ inputs.tag-value != '' }}
          labels: |
            org.opencontainers.image.title=VRC Backend
            org.opencontainers.image.description=VRC Class Reunion Backend API Server
            org.opencontainers.image.vendor=VRC
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 8

      - name: Resolve scan image reference
        id: scan-ref
        run: |
          IMAGE_REF=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      # ── Setup BuildKit ───────────────────────────────────────────────────
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # ── Registry login ───────────────────────────────────────────────────
      - name: Login to container registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      # ── Build (and optionally push) ──────────────────────────────────────
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha,scope=docker-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=docker-${{ github.ref_name }}
          provenance: true
          sbom: ${{ inputs.generate-sbom }}

      # ── Vulnerability scan ───────────────────────────────────────────────
      - name: Scan image with Trivy
        id: scan
        if: inputs.scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.scan-ref.outputs.image_ref }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: ${{ inputs.scan-severity }}
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
        continue-on-error: true

      # ── Upload scan results ──────────────────────────────────────────────
      - name: Upload Trivy scan results
        if: inputs.scan && always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-container-scan
          path: trivy-results.sarif
          retention-days: 30
          if-no-files-found: ignore

      # ── Generate attestation ─────────────────────────────────────────────
      - name: Generate build attestation
        if: inputs.push && inputs.generate-sbom
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## 🐳 Docker Build Summary

          | Property | Value |
          |----------|-------|
          | **Image** | `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}` |
          | **Digest** | `${{ steps.build.outputs.digest }}` |
          | **Pushed** | `${{ inputs.push }}` |
          | **Scan Result** | `${{ steps.scan.outcome == 'success' && '✅ Clean' || steps.scan.outcome == 'failure' && '⚠️ Vulnerabilities found' || '⏭️ Skipped' }}` |
          | **SBOM** | `${{ inputs.generate-sbom }}` |
          | **Platforms** | `${{ inputs.platforms }}` |

          <details>
          <summary>Tags</summary>

          ```
          ${{ steps.meta.outputs.tags }}
          ```
          </details>
          EOF
