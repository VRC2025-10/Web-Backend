# =============================================================================
#  Reusable Workflow: Discord Notification
#  Rich Discord webhook notifications with deployment status, metrics,
#  and actionable links. Supports multiple notification tiers.
# =============================================================================
name: "Reusable — Discord Notify"

on:
  workflow_call:
    inputs:
      runner-label:
        description: "Runner label"
        required: false
        type: string
        default: "arc-runner-set"
      status:
        description: "Pipeline status (success, failure, cancelled)"
        required: true
        type: string
      title:
        description: "Notification title"
        required: false
        type: string
        default: "VRC Backend Pipeline"
      environment:
        description: "Deployment environment (if applicable)"
        required: false
        type: string
        default: ""
      deploy-status:
        description: "Deployment status detail"
        required: false
        type: string
        default: ""
      deploy-duration:
        description: "Deployment duration in seconds"
        required: false
        type: string
        default: ""
      image-tag:
        description: "Docker image tag"
        required: false
        type: string
        default: ""
      additional-message:
        description: "Extra message to include"
        required: false
        type: string
        default: ""
      mention-on-failure:
        description: "Discord role ID to mention on failure"
        required: false
        type: string
        default: ""
    secrets:
      DISCORD_WEBHOOK_URL:
        required: true

permissions: {}

jobs:
  notify:
    name: "Discord Notification"
    runs-on: ${{ inputs.runner-label }}
    timeout-minutes: 5
    steps:
      - name: Send Discord notification
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ inputs.status }}
          TITLE: ${{ inputs.title }}
          ENVIRONMENT_NAME: ${{ inputs.environment }}
          DEPLOY_STATUS: ${{ inputs.deploy-status }}
          DEPLOY_DURATION: ${{ inputs.deploy-duration }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          ADDITIONAL_MESSAGE: ${{ inputs.additional-message }}
          MENTION_ON_FAILURE: ${{ inputs.mention-on-failure }}
        run: |
          if [[ -z "${WEBHOOK_URL}" ]]; then
            echo "Discord webhook is not configured; skipping notification"
            exit 0
          fi

          # Determine color based on status
          case "${STATUS}" in
            success)  COLOR=3066993  ;; # Green
            failure)  COLOR=15158332 ;; # Red
            cancelled) COLOR=9807270 ;; # Grey
            *)        COLOR=15105570 ;; # Orange
          esac

          # Build description
          DESC="**Status:** ${STATUS}"
          DESC+=$'\n'"**Commit:** [\`${GITHUB_SHA::8}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
          DESC+=$'\n'"**Branch:** \`${GITHUB_REF_NAME}\`"
          DESC+=$'\n'"**Actor:** ${GITHUB_ACTOR}"
          DESC+=$'\n'"**Workflow:** [${GITHUB_WORKFLOW}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"

          if [[ -n "${ENVIRONMENT_NAME}" ]]; then
            DESC+=$'\n'"**Environment:** ${ENVIRONMENT_NAME}"
          fi

          if [[ -n "${DEPLOY_STATUS}" ]]; then
            DESC+=$'\n'"**Deploy:** ${DEPLOY_STATUS}"
          fi

          if [[ -n "${DEPLOY_DURATION}" ]]; then
            DESC+=$'\n'"**Duration:** ${DEPLOY_DURATION}s"
          fi

          if [[ -n "${IMAGE_TAG}" ]]; then
            DESC+=$'\n'"**Image:** \`${IMAGE_TAG}\`"
          fi

          if [[ -n "${ADDITIONAL_MESSAGE}" ]]; then
            DESC+=$'\n\n'"${ADDITIONAL_MESSAGE}"
          fi

          # Build mention prefix for failures
          CONTENT=""
          if [[ "${STATUS}" == "failure" && -n "${MENTION_ON_FAILURE}" ]]; then
            CONTENT="<@&${MENTION_ON_FAILURE}>"
          fi

          # Build JSON payload with proper escaping for multiline content.
          PAYLOAD=$(DESC="${DESC}" CONTENT="${CONTENT}" COLOR="${COLOR}" TITLE="${TITLE}" python3 -c '
import json, os
from datetime import datetime, timezone

payload = {
    "content": os.environ["CONTENT"],
    "embeds": [
        {
            "title": os.environ["TITLE"],
            "description": os.environ["DESC"],
            "color": int(os.environ["COLOR"]),
            "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "footer": {
                "text": "Run #{} • {}".format(os.environ["GITHUB_RUN_NUMBER"], os.environ["GITHUB_REPOSITORY"])
            },
        }
    ],
}

print(json.dumps(payload))
')

          # Send webhook with retry
          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}" \
              "${WEBHOOK_URL}" 2>/dev/null || echo "000")

            if [[ "${HTTP_CODE}" =~ ^2[0-9]{2}$ ]]; then
              echo "Discord notification sent (HTTP ${HTTP_CODE})"
              break
            fi

            echo "Discord webhook failed (HTTP ${HTTP_CODE}), attempt ${attempt}/3"
            sleep $(( attempt * 2 ))
          done
