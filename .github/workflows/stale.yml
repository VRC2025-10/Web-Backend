# =============================================================================
#  Stale Issue/PR Management — VRC Web-Backend
#  Automatically labels and closes stale issues and PRs.
# =============================================================================
name: "Stale"

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: "Manage Stale Issues & PRs"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had activity in the last 60 days. It will be closed in 14 days if no
            further activity occurs. If this issue is still relevant, please leave
            a comment or remove the `stale` label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had activity in the last 30 days. It will be closed in 14 days if
            no further activity occurs. Please rebase and update if still relevant.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with no
            further activity.
          close-pr-message: >
            This PR was closed because it has been stale for 14 days with no
            further activity. Feel free to reopen if you'd like to continue.
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
          remove-stale-when-updated: true
