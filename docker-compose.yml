services:
  postgres:
    image: postgres:16-alpine
    container_name: vrc-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vrc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vrc_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-vrc_backend}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vrc} -d ${POSTGRES_DB:-vrc_backend}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
